<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umaker Pi Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'JetBrains+Mono', monospace;
            color: white;
            touch-action: none;
        }

        .watch-frame {
            width: 320px;
            height: 400px;
            background: #000;
            position: relative;
            border-radius: 50px;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            box-shadow: 0 0 30px rgba(125, 0, 255, 0.2);
        }

        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: center;
        }

        .menu-header {
            font-family: 'Orbitron';
            font-size: 20px;
            color: #00f2ff;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .game-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .game-card:hover {
            border-color: #7d00ff;
            background: #1a1a1a;
            transform: scale(1.05);
        }

        .game-card h3 {
            font-family: 'Orbitron';
            font-size: 16px;
            color: #7d00ff;
            text-transform: uppercase;
        }

        .game-container {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 200;
            color: #ff0055;
            font-family: 'Orbitron';
            font-size: 24px;
            cursor: pointer;
            text-shadow: 0 0 10px #ff0055;
            transition: all 0.2s ease;
        }

        .close-btn:active {
            transform: scale(0.8);
        }

        .back-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 200;
            color: #00f2ff;
            font-family: 'Orbitron';
            font-size: 28px;
            cursor: pointer;
            text-shadow: 0 0 15px #00f2ff;
            transition: all 0.2s ease;
        }

        .back-btn:active {
            transform: scale(1.5) rotate(20deg);
            color: #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(125, 0, 255, 0.05) 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }

        #pi-intro {
            position: absolute;
            width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 150; text-align: center; padding: 25px;
        }

        .pi-note {
            font-family: 'Orbitron';
            color: #7d00ff;
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #7d00ff;
        }

        .credits {
            font-family: 'Orbitron';
            font-size: 14px;
            color: #666;
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .credits span {
            color: #00f2ff;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            font-size: 16px;
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="watch-frame">
        <div class="overlay" id="global-overlay"></div>

        <!-- ANA MENÜ -->
        <div id="menu">
            <div class="menu-header">PI SYSTEM PRO</div>
            <div class="game-card" onclick="openGame()">
                <h3>π HESAPLAYICI</h3>
                <p class="text-[10px] text-gray-400 mt-2">Başlatmak için dokun.</p>
            </div>
            <div class="credits">
                YAPIMCILAR
                <span>Emir ve Nilda 8/B</span>
            </div>
        </div>

        <!-- PI EKRANI -->
        <div id="game1" class="game-container">
            <div class="close-btn" onclick="exitToMenu()">×</div>
            <div class="back-btn" onclick="toggleEasterEgg()">π</div>
            
            <div id="pi-intro">
                <div class="pi-note">SONSUZ DÖNGÜYÜ <br> TETİKLE</div>
                <button onclick="startPi()" class="border-2 border-cyan-400 text-cyan-400 px-8 py-3 font-black text-sm rounded-full shadow-lg shadow-cyan-900/50 hover:bg-cyan-400 hover:text-black transition-all">SİSTEMİ AÇ</button>
            </div>
            <canvas id="piCanvas"></canvas>
        </div>
    </div>

    <script>
        const piCanvas = document.getElementById('piCanvas');
        const piCtx = piCanvas.getContext('2d');
        const overlay = document.getElementById('global-overlay');
        
        let currentLoop = null;
        let isEasterEggActive = false;

        const piDigitsStr = "3141592653589793238462643383279502884197169399375105820974944592307816406286208998628034825342117067982148086513282306647093844609550582231725359408128481117450284102701938521105559644622948954930381964428810975665933446128475648233786783165271201909145648566923460348610454326648213393607260249141273";
        let piVisible = [];
        let piIndex = 0;
        let piFrame = 0;
        let piScrollY = 0;
        let piTargetY = 0;
        const fontSize = 24;
        const lineHeight = fontSize * 1.3;
        const cols = 6;
        const maxRows = 8;

        function openGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game1').style.display = 'block';
            piCanvas.width = 320; piCanvas.height = 400;
            piVisible = []; piIndex = 0; piScrollY = 0; piTargetY = 0;
            isEasterEggActive = false;
        }

        function exitToMenu() {
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('game1').style.display = 'none';
            document.getElementById('pi-intro').style.display = 'flex';
            isEasterEggActive = false;
            overlay.style.background = 'linear-gradient(rgba(125, 0, 255, 0.05) 50%, rgba(0, 0, 0, 0) 50%)';
        }

        function toggleEasterEgg() {
            if (document.getElementById('pi-intro').style.display !== 'none') return;
            isEasterEggActive = !isEasterEggActive;
            if (isEasterEggActive) {
                overlay.style.background = 'radial-gradient(circle, rgba(0, 255, 70, 0.15) 0%, rgba(0, 0, 0, 0) 80%)';
                piCtx.fillStyle = "white";
                piCtx.fillRect(0, 0, 320, 400);
            } else {
                overlay.style.background = 'linear-gradient(rgba(125, 0, 255, 0.05) 50%, rgba(0, 0, 0, 0) 50%)';
            }
        }

        function startPi() {
            document.getElementById('pi-intro').style.display = 'none';
            piLoop();
        }

        function piLoop() {
            if(document.getElementById('game1').style.display === 'none') return;
            const updateInterval = isEasterEggActive ? 4 : 8;
            if(piFrame % updateInterval === 0) {
                let char = piDigitsStr[piIndex % piDigitsStr.length];
                piVisible.push({ val: char, hue: (piIndex * 2) % 360 });
                piIndex++;
                const rows = Math.ceil(piVisible.length / cols);
                if(rows > maxRows) piTargetY = (rows - maxRows) * lineHeight;
            }
            piScrollY += (piTargetY - piScrollY) * 0.1;
            piCtx.clearRect(0, 0, 320, 400);
            piVisible.forEach((item, i) => {
                const c = i % cols;
                const r = Math.floor(i / cols);
                const shakeX = isEasterEggActive ? (Math.random() - 0.5) * 2 : 0;
                const shakeY = isEasterEggActive ? (Math.random() - 0.5) * 2 : 0;
                const x = (c * 45 + 35) + shakeX;
                const y = (r * lineHeight + 60 - piScrollY) + shakeY;
                if(y < -30 || y > 430) return;
                let opacity = 1;
                if(y < 100) opacity = Math.max(0, (y-40)/60);
                piCtx.globalAlpha = opacity;
                if (isEasterEggActive) {
                    piCtx.fillStyle = `hsl(${item.hue + piFrame * 2}, 100%, 50%)`;
                    piCtx.shadowBlur = 15;
                    piCtx.shadowColor = piCtx.fillStyle;
                    piCtx.font = `900 ${fontSize + 4}px 'Orbitron'`;
                } else {
                    piCtx.fillStyle = (i === 0) ? "#00f2ff" : "#7d00ff";
                    piCtx.shadowBlur = 8; piCtx.shadowColor = piCtx.fillStyle;
                    piCtx.font = `bold ${fontSize}px 'JetBrains Mono'`;
                }
                piCtx.fillText(item.val, x, y);
                if(i === 0 && !isEasterEggActive) piCtx.fillText(".", x+12, y);
            });
            piCtx.globalAlpha = 1; piFrame++;
            currentLoop = requestAnimationFrame(piLoop);
        }
    </script>
</body>
</html>
